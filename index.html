<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin Dashboard - ตะลุยป่าไตรยางศ์</title>
    
    <link rel="icon" href="https://i.postimg.cc/QdpZPdZ2/Chat-GPT-Image-19-m-y-2569-21-29-56.png" type="image/png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/QdpZPdZ2/Chat-GPT-Image-19-m-y-2569-21-29-56.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ระบบครู">
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #7f0101; --bg-color: #f5f5f5; }
        * { font-family: 'Sarabun', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        
        /* ล็อกหน้าจอไม่ให้เลื่อนในมือถือ */
        body { 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100dvh; 
            padding: 20px; 
            overflow: hidden; 
        }
        
        .container { 
            width: 100%; 
            max-width: 1100px; 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); 
            padding: 30px 40px; 
            margin: auto 0;
            display: flex;
            flex-direction: column;
            max-height: 90vh; /* บังคับไม่ให้กล่องล้นจอ */
        }
        
        .auth-section { max-width: 400px; margin: auto; text-align: center; }
        .auth-section h2 { color: var(--primary); margin-bottom: 20px; font-weight: 900; font-size: 28px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-weight: bold; color: #333; display: block; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: var(--primary); }
        
        button.btn-primary { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button.btn-primary:hover { background-color: #5c0000; }
        button.btn-text { background: none; border: none; color: #1976d2; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 15px; text-decoration: underline; width: 100%; }
        .status-msg { margin-top: 15px; font-weight: bold; display: none; font-size: 14px; }

        #dashboard-section { display: none; flex-direction: column; height: 100%; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 3px solid var(--primary); padding-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .header-container h2 { color: var(--primary); font-size: 24px; font-weight: 900; }
        
        .badge-live { background-color: #d32f2f; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; animation: pulse 1.5s infinite; display: inline-flex; align-items: center; gap: 8px; }
        .badge-live::before { content: ''; width: 10px; height: 10px; background-color: #fff; border-radius: 50%; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); } 100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); } }
        
        /* ให้ตารางเลื่อนได้ในตัวของมันเอง */
        .table-responsive { overflow: auto; flex: 1; width: 100%; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background-color: var(--primary); color: white; padding: 12px; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #eee; white-space: nowrap; vertical-align: middle; }
        
        .btn-cert { background: #ff9800; color: white; border: 2px solid #e65100; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-cert:hover { transform: scale(1.05); background: #e65100; }
        .btn-export-all { background: #2196f3; color: white; border: 2px solid #1976d2; border-radius: 6px; padding: 8px 15px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-export-all:hover { background: #1976d2; }

        .footer-credit { margin-top: 15px; text-align: center; color: #888888; font-size: 14px; line-height: 1.6; letter-spacing: 0.5px; flex-shrink: 0; }
        .admin-logo { width: 110px; max-width: 40%; height: auto; margin: 0 auto 15px auto; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        @media (max-width: 768px) { 
            .container { padding: 15px; width: 100%; margin: auto 0; }
            .header-container { flex-direction: column; text-align: center; } 
            .auth-section h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section" class="auth-section">
            <img src="https://i.postimg.cc/PfgtFc8D/Chat-GPT-Image-19-m-y-2569-21-33-38.png" alt="Admin Logo" class="admin-logo">
            <h2>🔒 เข้าสู่ระบบ</h2>
            <div class="input-group">
                <label>ชื่อผู้ใช้งาน (รหัสครู)</label>
                <input type="text" id="login-user" placeholder="เช่น 111">
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="attemptLogin()">เข้าสู่ระบบ</button>
            <button class="btn-text" onclick="toggleAuth('register')">ยังไม่มีบัญชี? สร้างห้องเรียนใหม่ (สำหรับครู)</button>
            <div id="login-error" class="status-msg"></div>
        </div>

        <div id="register-section" class="auth-section" style="display: none;">
            <img src="https://i.postimg.cc/PfgtFc8D/Chat-GPT-Image-19-m-y-2569-21-33-38.png" alt="Admin Logo" class="admin-logo">
            <h2>📝 สร้างห้องเรียนใหม่</h2>
            <p style="color: #666; font-size: 13px; margin-bottom: 20px;">*ชื่อผู้ใช้ จะถูกนำไปให้เด็กกรอกก่อนเริ่มเกม</p>
            <div class="input-group">
                <label>ตั้งชื่อผู้ใช้งาน (แนะนำตั้งเป็นตัวเลข)</label>
                <input type="text" id="reg-user" placeholder="เช่น 111, 501 (ห้ามเว้นวรรค)">
            </div>
            <div class="input-group">
                <label>ตั้งรหัสผ่าน</label>
                <input type="password" id="reg-pass" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="attemptRegister()" style="background-color: #1976d2;">ลงทะเบียนสร้างห้อง</button>
            <button class="btn-text" onclick="toggleAuth('login')">มีบัญชีอยู่แล้ว? กลับไปหน้าเข้าสู่ระบบ</button>
            <div id="reg-error" class="status-msg"></div>
        </div>

        <div id="dashboard-section">
            <div class="header-container">
                <h2>📊 กระดานคะแนน: ห้อง <span id="display-teacher"></span></h2>
                <div style="display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;">
                    <button class="btn-export-all" onclick="exportPDF('all')">📥 โหลด PDF รวมทุกคน</button>
                    <div class="badge-live">LIVE</div>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <div id="last-update" style="font-size: 12px; color:#666;">กำลังเชื่อมต่อ Firebase...</div>
                <button onclick="logout()" style="padding:6px 12px; background:#666; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">🚪 ออกจากระบบ</button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ลำดับ</th><th>ชื่อนักเรียน</th><th>ด่าน 1</th><th>ด่าน 2</th><th>ด่าน 3</th><th>บอสไฟต์</th><th>รวม 💎</th><th>ประเมิน</th><th>ใบประกาศ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div> <div class="footer-credit">
        💻 จัดทำโดย<br>
        นางสาวลลิตา โชครักษ์<br>
        โรงเรียนบ้านหาดส้มแป้น
    </div>

    <script>
        // ================= ตั้งค่า Firebase =================
        const firebaseConfig = {
            apiKey: "AIzaSyCczlWwxXAbhXL_Fy_H34ehBSEsvSkOXPU",
            authDomain: "triyang-quest-2a294.firebaseapp.com",
            
            // ✅ แก้ไขบรรดาทนี้ให้เป็น .firebaseio.com (ลิงก์ของเซิร์ฟเวอร์อเมริกา)
            databaseURL: "https://triyang-quest-2a294-default-rtdb.firebaseio.com", 
            
            projectId: "triyang-quest-2a294",
            storageBucket: "triyang-quest-2a294.firebasestorage.app",
            messagingSenderId: "662514531113",
            appId: "1:662514531113:web:52936ffb956d3475af1538"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let loggedInUser = "";
        let teacherNameLabel = "";
        let currentData = []; // เก็บข้อมูลนักเรียนไว้ใช้สร้าง PDF
        const { jsPDF } = window.jspdf;

        function toggleAuth(type) {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('reg-error').style.display = 'none';
            if(type === 'register') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('register-section').style.display = 'block';
            } else {
                document.getElementById('register-section').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
            }
        }

        // ระบบลงทะเบียนผ่าน Firebase
        async function attemptRegister() {
            let user = document.getElementById('reg-user').value.trim();
            let pass = document.getElementById('reg-pass').value.trim();
            let errorDiv = document.getElementById('reg-error');
            
            if(!user || !pass) { errorDiv.innerText = "กรุณากรอกข้อมูลให้ครบถ้วน"; errorDiv.style.color = "#d32f2f"; errorDiv.style.display = "block"; return; }
            if(user.includes(" ")) { errorDiv.innerText = "ชื่อผู้ใช้ห้ามเว้นวรรคครับ"; errorDiv.style.color = "#d32f2f"; errorDiv.style.display = "block"; return; }
            
            errorDiv.innerText = "กำลังสร้างห้องเรียน... ⏳";
            errorDiv.style.color = "#ff9800";
            errorDiv.style.display = "block";

            let roomRef = db.ref('rooms/' + user);
            roomRef.once('value').then(snapshot => {
                if(snapshot.exists()) {
                    errorDiv.innerText = "❌ รหัสครูนี้มีผู้ใช้งานแล้ว โปรดใช้รหัสอื่น";
                    errorDiv.style.color = "#d32f2f";
                } else {
                    roomRef.set({ password: pass, teacherName: "ครูรหัส " + user })
                    .then(() => {
                        errorDiv.innerText = "✅ สร้างห้องเรียนสำเร็จ!";
                        errorDiv.style.color = "#4caf50";
                        setTimeout(() => { toggleAuth('login'); document.getElementById('login-user').value = user; }, 2000);
                    });
                }
            }).catch(e => {
                errorDiv.innerText = "❌ เชื่อมต่อ Firebase ไม่สำเร็จ";
                errorDiv.style.color = "#d32f2f";
            });
        }

        // ระบบ Login และดึงข้อมูล Real-time จาก Firebase
        function attemptLogin() {
            let user = document.getElementById('login-user').value.trim();
            let pass = document.getElementById('login-pass').value.trim();
            let errorDiv = document.getElementById('login-error');
            
            if(!user || !pass) { errorDiv.innerText = "กรุณากรอกข้อมูลให้ครบถ้วน"; errorDiv.style.display = "block"; return; }
            
            errorDiv.innerText = "กำลังตรวจสอบ... ⏳";
            errorDiv.style.color = "#ff9800";
            errorDiv.style.display = "block";

            db.ref('rooms/' + user).once('value').then(snapshot => {
                if(snapshot.exists()) {
                    let data = snapshot.val();
                    if(data.password === pass) {
                        loggedInUser = user;
                        teacherNameLabel = data.teacherName || user;
                        document.getElementById('display-teacher').innerText = teacherNameLabel;
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('dashboard-section').style.display = 'flex';
                        
                        // ฟังข้อมูลนักเรียนตลอดเวลา (Real-time update)
                        db.ref('rooms/' + user + '/students').on('value', (snap) => {
                            let studentsData = [];
                            snap.forEach(child => { studentsData.push(child.val()); });
                            currentData = studentsData; 
                            renderTable(studentsData);
                        });
                    } else {
                        errorDiv.innerText = "❌ รหัสผ่านไม่ถูกต้อง";
                        errorDiv.style.color = "#d32f2f";
                    }
                } else {
                    errorDiv.innerText = "❌ ไม่พบห้องเรียนนี้ (ยังไม่ได้ลงทะเบียน)";
                    errorDiv.style.color = "#d32f2f";
                }
            }).catch(err => {
                errorDiv.innerText = "❌ เชื่อมต่อ Firebase ไม่สำเร็จ";
                errorDiv.style.color = "#d32f2f";
            });
        }

        // ฟังก์ชันโหลด PDF แบบแยกเป็น "ตารางรวม" และ "เกียรติบัตรเดี่ยว"
        function exportPDF(type, index = null) {
            // กำหนดขนาดกระดาษ (รวม=แนวตั้ง, เดี่ยว=แนวนอน)
            const orientation = type === 'all' ? 'portrait' : 'landscape';
            const doc = new jsPDF(orientation);
            
            // โหลดฟอนต์ภาษาไทย
            doc.addFont('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Regular.ttf', 'Sarabun', 'normal');
            doc.setFont('Sarabun');
            
            if (type === 'all') {
                // ==========================================
                // 1. โหลดแบบรวมทุกคน (ออกมาเป็นตาราง)
                // ==========================================
                doc.setFontSize(18);
                doc.text("สรุปคะแนน ภารกิจตะลุยป่าไตรยางศ์", 14, 20);
                doc.setFontSize(12);
                doc.text(`ข้อมูล ณ วันที่: ${new Date().toLocaleDateString('th-TH')}`, 14, 28);
                
                let columns = ["ชื่อนักเรียน", "ด่าน 1", "ด่าน 2", "ด่าน 3", "บอสไฟต์", "รวมเพชร"];
                let rows = [];
                currentData.forEach(r => rows.push([r.studentName, r.scoreLvl1, r.scoreLvl2, r.scoreLvl3, r.scoreBoss, r.totalScore]));

                doc.autoTable({ 
                    head: [columns], body: rows, startY: 35,
                    styles: { font: 'Sarabun', fontStyle: 'normal' },
                    headStyles: { fillColor: [127, 1, 1] } 
                });
                doc.save('สรุปคะแนน_ทุกคน.pdf');

            } else {
                // ==========================================
                // 2. โหลดรายคน (ออกมาเป็นเกียรติบัตรแนวนอน)
                // ==========================================
                let student = currentData[index];
                
                // วาดกรอบเกียรติบัตร 2 ชั้น (สีแดงเลือดหมู)
                doc.setLineWidth(3);
                doc.setDrawColor(127, 1, 1);
                doc.rect(10, 10, 277, 190); // กรอบนอก
                doc.setLineWidth(1);
                doc.rect(14, 14, 269, 182); // กรอบใน

                // ตกแต่งข้อความส่วนหัว
                doc.setFontSize(26);
                doc.setTextColor(127, 1, 1);
                doc.text("เกียรติบัตรฉบับนี้ให้ไว้เพื่อแสดงว่า", 148, 55, { align: "center" });

                // ชื่อนักเรียน (ตัวใหญ่สุด)
                doc.setFontSize(40);
                doc.setTextColor(0, 0, 0);
                doc.text(student.studentName, 148, 90, { align: "center" });

                // ข้อความชื่นชม
                doc.setFontSize(22);
                doc.setTextColor(50, 50, 50);
                doc.text("ได้ผ่านการพิชิตภารกิจ \"ตะลุยป่าไตรยางศ์\" สำเร็จยอดเยี่ยม", 148, 125, { align: "center" });
                
                // สรุปคะแนน
                doc.setFontSize(18);
                doc.setTextColor(230, 81, 0);
                doc.text(`สะสมได้ทั้งหมด: ${student.totalScore} / 65 เพชร  |  คะแนนบอสไฟต์: ${student.scoreBoss} / 44`, 148, 145, { align: "center" });

                // วันที่
                doc.setFontSize(16);
                doc.setTextColor(0, 0, 0);
                doc.text(`ให้ไว้ ณ วันที่ ${new Date().toLocaleDateString('th-TH')}`, 148, 175, { align: "center" });

                doc.save(`เกียรติบัตร_${student.studentName}.pdf`);
            }
        }

        function renderTable(data) {
            // เรียงให้คนล่าสุดอยู่บนสุด
            let displayData = [...data].reverse(); 
            let tbody = document.getElementById('tableBody');
            let html = '';
            
            displayData.forEach((row, reversedIndex) => {
                // หาค่า index ดั้งเดิมเพื่อส่งให้ PDF
                let originalIndex = data.length - 1 - reversedIndex; 

                let weaknesses = [];
                if (row.scoreLvl1 < 10) weaknesses.push("กลาง");
                if (row.scoreLvl2 < 10) weaknesses.push("สูง");
                if (row.scoreLvl3 < 20) weaknesses.push("ต่ำ"); 
                
                let isPerfect = weaknesses.length === 0 && row.scoreBoss >= 22;
                let feedback = isPerfect 
                    ? "<span style='color: #4caf50; font-weight: bold;'>✅ ยอดเยี่ยม</span>" 
                    : "<span style='color: #d32f2f; font-weight: bold;'>ซ่อม: " + (weaknesses.length > 0 ? weaknesses.join(", ") : "บอสไฟต์") + "</span>";

                let certBtn = (row.scoreLvl1 > 0 || row.scoreBoss > 0) 
                    ? `<button class="btn-cert" onclick="exportPDF('single', ${originalIndex})">🎓 โหลด PDF</button>` 
                    : `<span style="color:#aaa; font-size:12px;">ยังไม่จบภารกิจ</span>`;

                html += `<tr>
                    <td>${reversedIndex + 1}</td>
                    <td style="font-weight: bold; color: #7f0101;">${row.studentName || '-'}</td>
                    <td>${row.scoreLvl1 || '0'}</td>
                    <td>${row.scoreLvl2 || '0'}</td>
                    <td>${row.scoreLvl3 || '0'}</td>
                    <td>${row.scoreBoss || '0'}</td>
                    <td style="font-weight: 900; color: #f57f17;">${row.totalScore || '0'}</td>
                    <td>${feedback}</td>
                    <td>${certBtn}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
            
            let now = new Date();
            document.getElementById('last-update').innerText = "อัปเดตล่าสุด: " + now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function logout() {
            if(loggedInUser) db.ref('rooms/' + loggedInUser + '/students').off(); // หยุดฟังข้อมูล
            loggedInUser = ""; 
            document.getElementById('login-user').value = "";
            document.getElementById('login-pass').value = "";
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
        }
    </script>
</body>
</html>
